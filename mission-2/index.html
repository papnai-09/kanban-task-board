<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
<div class="container">
    <h1>Expense Tracker</h1>

    <div class="salary-section card">
        <label for="salaryInput">Total Salary</label>
        <input type="number" id="salaryInput" placeholder="Enter your salary">
        <button id="setSalaryBtn"><i class="fas fa-check"></i> Set Salary</button>
    </div>

    <div class="expense-section card">
        <label for="expenseName">Expense Name</label>
        <input type="text" id="expenseName" placeholder="e.g. Rent">

        <label for="expenseAmount">Expense Amount</label>
        <input type="number" id="expenseAmount" placeholder="e.g. 1500">

        <button id="addExpenseBtn"><i class="fas fa-plus"></i> Add Expense</button>
    </div>

    <div class="summary card">
        <div class="summary-row">
            <span>Total Salary:</span>
            <span>₹<span id="salary">0</span></span>
        </div>
        <div class="summary-row">
            <span>Total Expenses:</span>
            <span>₹<span id="totalExpense">0</span></span>
        </div>
        <div class="summary-row balance-row">
            <span>Remaining Balance:</span>
            <span>₹<span id="balance">0</span></span>
        </div>
    </div>

    <div class="chart-container card">
        <canvas id="expenseChart"></canvas>
    </div>

    <h2>Expense List</h2>
    <ul id="expenseList"></ul>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
</body>
</html>
